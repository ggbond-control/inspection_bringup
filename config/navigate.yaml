mode: nav

modules:
  nav_bridge: true
  livox: true
  slam: true
  terrain: true
  local_planner: true
  global_planner: true

bringup:
  start_mode: service
  start_service: /navigation_bringup/start
  result_timeout_seconds: 0.0
  sequence:
    - nav_bridge
    - livox
    - slam
    - terrain
    - local_planner
    - global_planner
  start_delay_seconds: 1.0
  wait_for_readiness: true
  shutdown_on_readiness_failure: true
  wait_timeout_seconds: 10.0

nav_bridge:
  readiness:
    type: nav_bridge
    topics:
      - /battery/level
    stand_service: /nav_bridge_node/stand
    topic_timeout_seconds: 10.0
    stand_timeout_seconds: 30.0

livox:
  model: mid360
  readiness:
    type: topics
    topics:
      - /livox/lidar
    timeout_seconds: 10.0

slam:
  relocal: true
  prior_dir: ""
  rviz: false
  pgo: false
  odom_imu: true
  use_sim_time: false
  readiness:
    type: localization_init
    status_topic: /localization_init_status
    timeout_seconds: 0.0
    blocked_is_failure: true
    release_control_on_blocked: true
    release_control_service: /nav_bridge_node/release_control
    release_control_timeout_seconds: 5.0

terrain:
  rviz: false
  use_gpu: true
  readiness:
    type: nodes
    nodes:
      - /gridmapper_node
    timeout_seconds: 10.0

local_planner:
  use_sim_time: false
  start_rviz: false
  readiness:
    type: nodes
    nodes:
      - /localPlanner
      - /pathFollower
    timeout_seconds: 10.0

global_planner:
  initial_map: ""
  multi_map_dir: ""
  use_fake_cmdvel: true
  params_file: "new_local"
  waypoint_dwell_time: 1.0
  patrol_loops: 1
  readiness:
    type: health
    topic: /multi_map_nav/health
    timeout_seconds: 10.0
