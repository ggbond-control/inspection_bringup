modules:
  task_hub: true
  gimbal: true
  charge: true
  sensors: true
  alarm: true
  light: true
  gas: true
  thermal: true
  acoustic: false
  mqtt: true

mqtt:
  sn: x30
  host: 192.168.2.107
  port: 1883
  topic_vendor_prefix: test
  topic_root: device
  map_root_directory: /home/cat/Workspace/Maps
  localization_set_parameters_service: /navigation_bringup/start
  localization_map_parameter_name: slam.prior_dir
  localization_initial_map_parameter_name: global_planner.initial_map
  localization_set_parameter_timeout_sec: 60.0
  localization_service_wait_timeout_sec: 5.0
  acoustic_start_service_name: /monitor/acoustic/start
  acoustic_stop_service_name: /monitor/acoustic/stop
  stand_service_name: /nav_bridge_node/stand
  lie_service_name: /nav_bridge_node/lie
  soft_estop_service_name: /nav_bridge_node/soft_estop
  manual_jog_max_duration_ms: 2500

live_stream:
  config_path: ""
  request_on_startup: true
  enable_push: true
  ffmpeg_bin: ffmpeg
  restart_interval_sec: 5.0
  acoustic_overlay:
    enabled: false
    stream_id: x30_acoustic_overlay
    topic: /monitor/acoustic/overlay
    status_topic: /platform/acoustic_overlay_stream/status
    fps: 10.0
    bitrate: 1500k
    video_codec: h264_rkmpp
    output_format: flv
    restart_interval_sec: 5.0
  acoustic_camera:
    enabled: true
    stream_id: x30_acoustic_camera
    topic: /monitor/acoustic/camera
    status_topic: /platform/acoustic_camera_stream/status
    fps: 10.0
    bitrate: 1500k
    video_codec: h264_rkmpp
    output_format: flv
    restart_interval_sec: 5.0
  acoustic_heatmap:
    enabled: true
    stream_id: x30_acoustic_heatmap
    topic: /monitor/acoustic/heatmap
    status_topic: /platform/acoustic_heatmap_stream/status
    fps: 10.0
    bitrate: 1500k
    video_codec: h264_rkmpp
    output_format: flv
    restart_interval_sec: 5.0
  ffmpeg:
    loglevel: warning
    realtime_input: true
    rtsp_transport: tcp
    video_codec: copy
    audio_codec: copy
    output_format: flv

task_hub:
  default_route_config_path: ""
  runtime_log_directory: "~/runtime_logs"
  algorithm_execute_url: "http://192.168.2.108:15680/openApi/gateway/algorithm/loop/execute"
  algorithm_stop_url: "http://192.168.2.108:15680/openApi/gateway/algorithm/loop/stop"
  algorithm_visible_stream_url: ""
  algorithm_callback_url: "http://192.168.2.99:8081/api/v1/algorithm/result"
  algorithm_callback_port: 8081
  algorithm_http_timeout_seconds: 10.0
  stand_service_name: "/nav_bridge_node/stand"
  lie_service_name: "/nav_bridge_node/lie"
  set_gait_service_name: "/nav_bridge_node/set_gait"
  navigation_action_name: "multi_map_navigate_to_pose"
  gimbal_action_name: "follow_joint_trajectory"
  capture_action_name: "capture_media"
  navigation_validate_waypoints_service: "/validate_route_waypoints"
  require_waypoint_validation_success: false
  navigation_heartbeat_topic: "/inspection_task_hub/heartbeat/navigation"
  gimbal_heartbeat_topic: "/inspection_task_hub/heartbeat/gimbal"
  odometry_topic: "/odometry_multi_maps"
  robot_basic_state_topic: "/robot_basic_state"
  charge_manager_state_topic: "/charge_manager_state"
  heartbeat_timeout_seconds: 3.0
  robot_state_timeout_seconds: 3.0
  trigger_service_timeout_seconds: 30.0
  manual_mode_ready_timeout_seconds: 60.0

gimbal:
  params_file: ""
  camera_backend: "gimbal_hk"
  launch_post_waypoint_home_bridge: false
  use_http_isapi_absolute_ptz: true
